name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: watcher
        run: pip install -r requirements.txt

      - name: Build exe
        working-directory: watcher
        run: |
          pyinstaller --onefile --windowed `
            --hidden-import=win32print `
            --hidden-import=win32ui `
            --hidden-import=win32api `
            --collect-all customtkinter `
            --name gtx4-watcher `
            main.py

      - name: Prepare release assets
        working-directory: watcher
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force
          Copy-Item dist/gtx4-watcher.exe release/
          Copy-Item config.py release/
          # config.ini 기본값 생성용으로 한번 실행
          python -c "import sys; sys.path.insert(0,'.'); import config"
          Copy-Item config.ini release/
          Compress-Archive -Path release/* -DestinationPath ../gtx4-watcher-${{ github.ref_name }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.3.2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: gtx4-watcher-${{ github.ref_name }}.zip
